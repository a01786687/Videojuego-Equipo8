<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anura</title>

    <!-- Google pixel font -->
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <script src="js/libs/Vector.js"></script>
    <script src="js/libs/GameObject.js"></script>
    <script src="js/libs/AnimatedObject.js"></script>
    <script src="js/libs/Player.js"></script>
    <script src="js/libs/Rect.js"></script>
    <script src="js/libs/game_functions.js"></script>
    <script src="js/libs/TextLabel.js"></script>
    <script src="js/libs/levels.js"></script>

    <script src="./js/cards.js"></script>
    <script src="./js/index.js"></script>

    <!-- Entities -->
    <script src="js/entities/platforms.js"></script>
    <script src="js/entities/enemy.js"></script>
    <script src="js/entities/frog.js"></script>
    <script src="js/entities/SnakeBoss.js"></script>

    <!-- Systems -->
    <script src="js/systems/camera.js"></script>
    <script src="js/systems/collisions.js"></script>
    <script src="js/systems/hud.js"></script>
    <script src="js/systems/levelGenerator.js"></script>

    <script src="./js/uiComponents.js"></script>
    <script src="./js/scenes/authentication/auth.js"></script>

    <!-- Scenes -->
    <script src="./js/scenes/titleScene.js"></script>
    <script src="./js/scenes/playScene.js"></script>
    <script src="./js/scenes/bossScene1.js"></script>
    <script src="./js/scenes/settingsScene.js"></script>
    <script src="js/scenes/cardSelectionScene.js"></script>

    <!-- Authentication scenes-->
    <script src="./js/scenes/authentication/loginScene.js"></script>
    <script src="./js/scenes/authentication/registerScene.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>

</head>
 
<body>
 
    <!-- Header -->
    <header id="headerContainer">
        <h1 class="header">Anura</h1>
    </header>
 
    <!-- Main game area -->
    <main>
        <div id="game-container">
            <canvas id="canvas"></canvas>

            <!-- Settings form -->
            <div id="settings-form" class="auth-form hidden">
                <h2>SETTINGS</h2>
                <label for="brightness-slider">BRIGHTNESS</label>
                <input type="range" id="brightness-slider" min="0.5" max="1.5" step="0.1" value="1" oninput="changeBrightness(this.value)">
                <p id="brightness-value">100%</p>
            </div>
 
            <!-- Login form -->
            <div id="login-form" class="auth-form hidden">
                <h2>Log In</h2>
                <input type="text" id="login-username" placeholder="Enter username">
                <input type="password" id="login-password" placeholder="Enter password">
                <button id="login-button">Log In</button>
                <p id="go-register" class="auth-link">Don't have an account? Register</p>
                <p id="login-message"></p>
            </div>
 
            <!-- Register form -->
            <div id="register-form" class="auth-form hidden">
                <h2>Register</h2>
                <input type="text" id="register-username" placeholder="Choose a username">
                <input type="email" id="register-email" placeholder="Enter email">
                <input type="password" id="register-password" placeholder="Choose a password">
                <button id="register-button">Create Account</button>
                <p id="go-login" class="auth-link">Already have an account? Log In</p>
                <p id="register-message"></p>
            </div>

        </div>

        <div id="controls-info">
            <h3>CONTROLS</h3>
            <p>Move Left / Right: A / D</p>
            <p>Aim up: W</p>
            <p>Jump: spacebar</p>
            <p>Dash: j</p>
            <p>Attack: i</p>
            <p>Pause: esc</p>
        </div>
    
    <div id="Stats-section">
    <p>Canva</p>

    <canvas id="myChart" style="width:100%;max-width:600px"></canvas>
    <script>
        async function testStats(){
            const res = await fetch("http://localhost:8080/stats");
            let data = await res.json();

            if(data.length > 0){
                return data;
            }

        }
       
        async function plot(){
            const xValues = [];
            const yValues = [];
            const data = await testStats();
            console.log(data);
            for (let i = 0; i < data.length; i++){
                
                xValues.push(data[i].run_session_id);
                yValues.push(data[i].totalRunPerSession);
            }

                const barColors = [
                "#b91d47",
                "#00aba9",
                "#2b5797"
            ];

            ctx = document.getElementById('myChart');

            new Chart(ctx, {
                type: "pie",
                data: {
                    labels: xValues,
                    datasets: [{
                        backgroundColor: barColors,
                        data: yValues
                    }]
                },
                options: {
                    plugins: {
                        legend: { display: true },
                        title: {
                            display: true,
                            text: "Totals runs per session",
                            font: { size: 16 }
                        }
                    }
                }
            });
            
        }
        
        // plot();

        
        
        
        
        
    </script>
    </div>
    </main>

</body>

</html>
