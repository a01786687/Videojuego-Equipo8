<!--

File: index.html

Description: this file is the starting point of the videogame.
It defines the base structure of the HTML document, it links
the stylesheet, and connects the game engine.

-->

<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anura</title>

    <!-- Google pixel font -->
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <script src="js/libs/Vector.js"></script>
    <script src="js/libs/GameObject.js"></script>
    <script src="js/libs/AnimatedObject.js"></script>
    <script src="js/libs/Player.js"></script>
    <script src="js/libs/Rect.js"></script>
    <script src="js/libs/game_functions.js"></script>

    <script src="./js/index.js"></script>
    <script src="./js/uiComponents.js"></script>
    <script src="./js/api.js"></script>

    <!-- Authentication backend -->
    <script src="./js/scenes/authentication/auth.js"></script>
 
    <!-- Scenes -->
    <script src="./js/scenes/titleScene.js"></script>
    <script src="./js/scenes/playScene.js"></script>
    <script src="./js/scenes/settingsScene.js"></script>
 
    <!-- Authentication scenes-->
    <script src="./js/scenes/authentication/loginScene.js"></script>
    <script src="./js/scenes/authentication/registerScene.js"></script>

    


 
</head>
 
<body>
 
    <!-- Header -->
    <header id="headerContainer">
        <h1 class="header">Anura</h1>
    </header>
 
    <!-- Main game area -->
    <main>
        <div id="game-container">
            <canvas id="canvas"></canvas>

            <!-- Settings form -->
            <div id="settings-form" class="auth-form hidden">
                <h2>SETTINGS</h2>
                <label for="brightness-slider">BRIGHTNESS</label>
                <input type="range" id="brightness-slider" min="0.5" max="1.5" step="0.1" value="1" oninput="changeBrightness(this.value)">
                <p id="brightness-value">100%</p>
            </div>
 
            <!-- Login form -->
            <div id="login-form" class="auth-form hidden">
                <h2>Log In</h2>
                <input type="text" id="login-username" placeholder="Enter username">
                <input type="password" id="login-password" placeholder="Enter password">
                <button id="login-button">Log In</button>
                <p id="go-register" class="auth-link">Don't have an account? Register</p>
                <p id="login-message"></p>
            </div>
 
            <!-- Register form -->
            <div id="register-form" class="auth-form hidden">
                <h2>Register</h2>
                <input type="text" id="register-username" placeholder="Choose a username">
                <input type="email" id="register-email" placeholder="Enter email">
                <input type="password" id="register-password" placeholder="Choose a password">
                <button id="register-button">Create Account</button>
                <p id="go-login" class="auth-link">Already have an account? Log In</p>
                <p id="register-message"></p>
            </div>

        </div>
    </main>

</body>

</html>
