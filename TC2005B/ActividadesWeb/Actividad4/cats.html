<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cats - Meow Cat Cafe</title>
    <link rel ="stylesheet" href="css/style.css">
    <!-- fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- nav bar-->
    <section id="nav-bar">
        <div class="nav">
            <div class="nav-one">
                <h1>Meow Cat Cafe</h1>
            </div>

            <div class="list">
                <ul>
                    <li class="navBarItems"><a href="index.html">Home</a></li>
                    <li class="navBarItems"><a href="menu.html">Menu</a></li>
                    <li class="navBarItems"><a href="cats.html">Cats</a></li>
                    <li class="navBarItems"><a href="index.html#gallery">Gallery</a></li>
                    <li class="navBarItems"><a href="index.html#contact">Contact</a></li>
                </ul>
            </div>
        </div>

    </section>

        <!-- Menu title -->
    <section class="catsHeader">
        <h1>Meet Our Cats!</h1>
        <p>Get to know our adorable residents</p>
    </section>
    
    <!-- cat grid layout -->
    <section class="catsLayout" id="catsLayout">
        
    </section>
    
    <script>
        fetch('http://localhost:8080/api/cats')
        .then(res => res.json())
        .then(cats => {
            const container = document.getElementById('catsLayout')
            cats.forEach(cat => {
                container.innerHTML += `
                    <div class="catCard">
                        <img src="${cat.image}" alt="${cat.name}">
                        <h3>${cat.name}</h3>
                        <p><b>Age:</b> ${cat.age}</p>
                        <p><b>Character:</b> ${cat.personality}</p>
                    </div>
                `
            });
        })
    </script>
</body>
</html>
