<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Meow Cat Cafe</title>
    <link rel ="stylesheet" href="css/style.css">

    <!-- fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- nav bar-->
    <section id="nav-bar">
        <div class="nav">
            <div class="nav-one">
                <h1>Meow Cat Cafe</h1>
            </div>

            <div class="list">
                <ul>
                    <li class="navBarItems"><a href="index.html">Home</a></li>
                    <li class="navBarItems"><a href="menu.html">Menu</a></li>
                    <li class="navBarItems"><a href="cats.html">Cats</a></li>
                    <li class="navBarItems"><a href="index.html#gallery">Gallery</a></li>
                    <li class="navBarItems"><a href="index.html#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </section> 
    

    <!-- Menu title -->
    <section class="menuHeader">
        <h1>Our Menu</h1>
        <p>Explore our daily specials</p>
    </section>


    <!-- day selector-->
    
    <section class="daySelector">
        <!-- IMPORTANT-->
        <!-- data-day tells JavaScript which menu to show when this button is clicked. -->
        <button class="dayButton" data-day="monday">Monday</button>
        <button class="dayButton" data-day="tuesday">Tuesday</button>
        <button class="dayButton" data-day="wednesday">Wednesday</button>
        <button class="dayButton" data-day="thursday">Thursday</button>
        <button class="dayButton" data-day="friday">Friday</button>
        <button class="dayButton" data-day="saturday">Saturday</button>
        <button class="dayButton" data-day="sunday">Sunday</button>
    </section>


    <!-- menu -->
    <section class="menuContainer">

        <div class="menuLayout active" id="menuDisplay">

            <!-- menu items will be loaded here by JQuery script -->
            
        </div>

    </section>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
